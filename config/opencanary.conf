{
    "device.node_id": "backup-db-honeypot",
    "ip.ignorelist": [],
    "git.enabled": false,
    "ftp.enabled": true,
    "ftp.port": 21,
    "ftp.banner": "FTP server ready",
    "http.enabled": true,
    "http.port": 80,
    "http.banner": "Apache/2.4.41 (Ubuntu)",
    "http.skin": "grafanaLogin",
    "httpproxy.enabled": false,
    "mssql.enabled": false,
    "mysql.enabled": true,
    "mysql.port": 3306,
    "mysql.banner": "5.7.32-log",
    "ntp.enabled": false,
    "rdp.enabled": false,
    "redis.enabled": true,
    "redis.port": 6379,
    "sip.enabled": false,
    "smb.enabled": false,
    "smtp.enabled": false,
    "snmp.enabled": false,
    "ssh.enabled": true,
    "ssh.port": 22,
    "ssh.version": "SSH-2.0-OpenSSH_8.4p1",
    "portscan.enabled": true,
    "portscan.ignore_localhost": true,
    "telnet.enabled": false,
    "tftp.enabled": false,
    "vnc.enabled": false,
    "logger": {
        "class": "PyLogger",
        "kwargs": {
            "formatters": {
                "plain": {
                    "format": "%(message)s"
                }
            },
            "handlers": {
                "console": {
                    "class": "logging.StreamHandler",
                    "stream": "ext://sys.stdout"
                },
                "file": {
                    "class": "logging.FileHandler",
                    "filename": "/var/log/opencanary.log",
                    "formatter": "plain"
                }
            }
        }
    }
}
